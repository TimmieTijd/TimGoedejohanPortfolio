<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <ul class="navbar">
                <li><a href="index.html">About Me</a></li>
                <li><a href="MyProjects.html">Projects</a></li>
                <li><a href="Skills.html">Skills</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

<main class="container">
    <h1>Contact Me</h1>
    <p>Do you have any questions, contact me!</p>

    <form action="https://formspree.io/f/mgopdqde" method="POST" class="contact-form">
        <div class="form-group">
            <label for="name">Naam:</label>
            <input type="text" id="name" name="name" placeholder="Full name" required>
        </div>

        <div class="form-group">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Message" required></textarea>
        </div>

        <button type="submit" class="submit-btn">Send message</button>
    </form>

    <hr class="footer-line">

    <footer class="socials">
        <div class="social-item">
            <img src="linkedin_logo.png" alt="LinkedIn">
            <span>@TimGoedejohan</span>
        </div>
        <div class="social-item">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c2/GitHub_Invertocat_Logo.svg" alt="GitHub">
            <span>@TimmieTijd</span>
        </div>
        <div class="social-item">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/3840px-Instagram_logo_2016.svg.png" alt="Instagram">
            <span>@Tim_oedejohan</span>
        </div>
    </footer>
</main>

</body>
</html>

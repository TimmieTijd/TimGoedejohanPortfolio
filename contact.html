<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <ul class="navbar">
                <li><a href="index.html">About Me</a></li>
                <li><a href="MyProjects.html">Projecten</a></li>
                <li><a href="vaardigheden.html">Vaardigheden</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

<main class="container">
    <h1>Contact Me</h1>
    <p>Heb je een vraag of wil je samenwerken? Laat een berichtje achter!</p>

    <form action="https://formspree.io/f/JOUW_EMAIL_HIER" method="POST" class="contact-form">
        <div class="form-group">
            <label for="name">Naam:</label>
            <input type="text" id="name" name="name" placeholder="Je volledige naam" required>
        </div>

        <div class="form-group">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="jouw@email.com" required>
        </div>

        <div class="form-group">
            <label for="message">Bericht:</label>
            <textarea id="message" name="message" rows="5" placeholder="Wat wil je kwijt?" required></textarea>
        </div>

        <button type="submit" class="submit-btn">Verstuur bericht</button>
    </form>

    <hr class="footer-line">

    <footer class="socials">
        <div class="social-item">
            <img src="linkedin-icon.png" alt="LinkedIn">
            <span>@jouwgebruikersnaam</span>
        </div>
        <div class="social-item">
            <img src="github-icon.png" alt="GitHub">
            <span>@jouwgebruikersnaam</span>
        </div>
        <div class="social-item">
            <img src="instagram-icon.png" alt="Instagram">
            <span>@jouwgebruikersnaam</span>
        </div>
    </footer>
</main>

</body>
</html>
